<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תמיכה עם סוכן AI - HomePay</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            display: flex;
            justify-content: center;

        header {
            background: #ffffff;
            padding: 15px 20px;

        .back-button {
            position: absolute;

            padding: 8px 16px;
            border-radius: 20px;

        }

        }
        
        .header-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .header-button {

            transform: translateY(0);

        @media (max-width: 768px) {
            header {
                padding: 10px 15px;

        .message-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .quick-actions {
            display: flex;
            gap: 8px;

        .quick-action-btn {
            background: rgba(30, 60, 114, 0.1);

        .verification-container {

<body>
    <header>
        <img src="assets/hplogo.png" alt="HomePay Logo">
        <div class="header-buttons">
            <a href="index.html" class="header-button">← חזרה למדריך</a>
            <button id="contact-human-header" class="header-button" onclick="contactHumanRepresentative()">פניה לנציג אנושי</button>
        </div>
    </header>

    <!-- Phone Verification Form -->
    <div id="phone-verification-container" class="verification-container">
        <div class="verification-form">
            <h2>אימות טלפון</h2>
            <p>על מנת להתחיל שיחה עם הסוכן, אנא הזן את מספר הטלפון שלך לקבלת קוד אימות:</p>
            
            <form id="phone-form">
                <div class="form-group">
                    <label for="phone-input">מספר טלפון:</label>
                    <input type="tel" id="phone-input" placeholder="+972-50-1234567" value="+972-" required>
                </div>
                <button type="submit" class="verify-btn">שלח קוד אימות</button>
            </form>
            
            <div id="verification-code-section" style="display: none;">
                <div class="form-group">
                    <label for="code-input">קוד אימות:</label>
                    <input type="text" id="code-input" placeholder="הזן קוד בן 4 ספרות" maxlength="4" required>
                </div>
                <button id="verify-code-btn" class="verify-btn">אמת קוד</button>
            </div>
            
            <div id="verification-message" class="message"></div>
        </div>
    </div>

    <div class="chat-container" id="chat-container" style="display: none;">
        <div class="chat-header">
            <div class="status-indicator"></div>
            <h1><span id="agentName">AI סוכן</span> 🤖</h1>
            <p>מוכן לעזור לך עם כל שאלה</p>
            <img id="agentAvatar" src="" alt="תמונת פרופיל" class="agent-avatar" style="display: none;">
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="welcome-section">
                <div class="rocket-emoji">🚀</div>
                <h2>ברוכים הבאים לצ'אט AI!</h2>
                <p>אני כאן לעזור לך עם כל שאלה או בעיה. כשוני תכתוב לי מה שמעניין אותך.</p>
                <div class="bot-message">
                    שלום! אני הסוכן הדיגיטלי שלך. איך אני יכול לעזור לך היום?
                </div>
                <div class="quick-actions">
                    <button class="quick-action-btn" onclick="sendQuickMessage('שירותים')">שירותים</button>
                    <button class="quick-action-btn" onclick="sendQuickMessage('עזרה טכנית')">עזרה טכנית</button>
                    <button class="quick-action-btn" onclick="sendQuickMessage('יצירת קשר')">יצירת קשר</button>
                </div>
            </div>
        </div>
        <form class="chat-input" id="chat-form">
            <input type="text" id="user-input" placeholder="הקלד את ההודעה שלך כאן..." autocomplete="off">
            <button type="submit">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="m22 2-7 20-4-9-9-4z"/>
                    <path d="M22 2 11 13"/>
                </svg>
            </button>
        </form>
        
        <div class="chat-footer">
        </div>
    </div>

    <script>
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatMessages = document.getElementById('chat-messages');
        const typingIndicator = document.getElementById('typing-indicator');
        
        // Load agent settings on page load
        async function loadAgentSettings() {
            try {
                const response = await fetch('/api/get_representative');
                if (response.ok) {
                    window.agentSettings = await response.json();
                    
                    // Update agent name in header
                    const agentNameElement = document.getElementById('agentName');
                    if (agentNameElement && window.agentSettings.name) {
                        agentNameElement.textContent = window.agentSettings.name;
                    }
                    
                    // Update profile picture in header
                    const agentAvatarElement = document.getElementById('agentAvatar');
                    if (agentAvatarElement && window.agentSettings.profile_picture) {
                        agentAvatarElement.src = `/client/${window.agentSettings.profile_picture}`;
                        agentAvatarElement.style.display = 'block';
                        agentAvatarElement.style.cursor = 'pointer';
                        agentAvatarElement.onclick = showEnlargedProfilePicture;
                        agentAvatarElement.onerror = function() {
                            this.style.display = 'none';
                        };
                    }
                }
            } catch (error) {
                console.log('Could not load agent settings:', error);
                window.agentSettings = null;
            }
        }
        
        // Load agent settings when page loads
        window.addEventListener('load', loadAgentSettings);
        
        // Store chat transcript for logging
        window.chatTranscript = [];
        window.userPhone = null;
        
        // Function to add message to transcript
        function addToTranscript(message, sender) {
            const timestamp = new Date().toLocaleString('he-IL');
            window.chatTranscript.push({
                timestamp: timestamp,
                sender: sender,
                message: message,
                phone: window.userPhone
            });
        }
        
        // Function to get formatted transcript
        function getFormattedTranscript() {
            let transcript = 'תמליל שיחה עם סוכן AI - HomePay\n';
            transcript += '=====================================\n';
            if (window.userPhone) {
                transcript += `מספר טלפון: ${window.userPhone}\n`;
            }
            transcript += '\n';
            
            window.chatTranscript.forEach(entry => {
                const senderName = entry.sender === 'user' ? 'משתמש' : 'סוכן AI';
                transcript += `[${entry.timestamp}] ${senderName}: ${entry.message}\n\n`;
            });
            
            return transcript;
        }
        
        // Function to send quick message
        function sendQuickMessage(message) {
            addMessage(message, 'user');
            addToTranscript(message, 'user');
            
            typingIndicator.style.display = 'block';
            
            setTimeout(() => {
                typingIndicator.style.display = 'none';
                
                let response;
                switch(message) {
                    case 'מידע על שירותים':
                        response = 'אנחנו מציעים מגוון שירותים פיננסיים מתקדמים. האם תרצה לשמוע על שירות ספציפי?';
                        break;
                    case 'עזרה טכנית':
                        response = 'אני כאן לעזור עם כל בעיה טכנית. אנא תאר את הבעיה שלך בפירוט.';
                        break;
                    case 'יצירת קשר':
                        response = 'תוכל ליצור קשר איתנו בטלפון 03-1234567 או באימייל support@homepay.co.il';
                        break;
                    default:
                        response = 'תודה על הפנייה! איך אני יכול לעזור לך?';
                }
                
                addMessage(response, 'ai');
                addToTranscript(response, 'ai');
            }, 800);
        }

        // Function to contact human representative
        async function contactHumanRepresentative() {
            const transcript = getFormattedTranscript();
            
            // Log the transcript to server
            try {
                await fetch('/api/log_chat_transcript', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        transcript: transcript,
                        timestamp: new Date().toISOString(),
                        phone: window.userPhone
                    }),
                });
            } catch (error) {
                console.error('Error logging transcript:', error);
            }
            
            // Create email
            const subject = encodeURIComponent('העברת פניה לנציג אנושי');
            const body = encodeURIComponent(transcript);
            const emailUrl = `mailto:info@homepay.co.il?subject=${subject}&body=${body}`;
            
            // Open email client
            window.location.href = emailUrl;
        }
        
        // Function to show profile picture in enlarged view
        function showEnlargedProfilePicture() {
            if (!window.agentSettings?.profile_picture) return;
            
            // Create modal overlay
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.8);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1000;
                cursor: pointer;
            `;
            
            // Create enlarged image
            const img = document.createElement('img');
            img.src = `/client/${window.agentSettings.profile_picture}`;
            img.style.cssText = `
                max-width: 90%;
                max-height: 90%;
                border-radius: 10px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            `;
            
            modal.appendChild(img);
            document.body.appendChild(modal);
            
            // Close modal on click
            modal.addEventListener('click', function() {
                document.body.removeChild(modal);
            });
            
            // Close modal on escape key
            const escapeHandler = function(e) {
                if (e.key === 'Escape') {
                    document.body.removeChild(modal);
                    document.removeEventListener('keydown', escapeHandler);
                }
            };
            document.addEventListener('keydown', escapeHandler);
        }
        
        // Phone verification functionality
        document.getElementById('phone-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const phoneInput = document.getElementById('phone-input');
            const phone = phoneInput.value.trim();
            const messageDiv = document.getElementById('verification-message');
            
            if (!phone) {
                showMessage('אנא הזן מספר טלפון', 'error');
                return;
            }
            
            // Simple phone validation
            const phoneRegex = /^[0-9\-\s\+\(\)]{9,15}$/;
            if (!phoneRegex.test(phone)) {
                showMessage('אנא הזן מספר טלפון תקין', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/send_verification_code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ phone: phone }),
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    window.userPhone = phone;
                    document.getElementById('verification-code-section').style.display = 'block';
                    phoneInput.disabled = true;
                    document.querySelector('#phone-form button').disabled = true;
                    showMessage('קוד אימות נשלח בהצלחה! אנא הזן את הקוד שקיבלת', 'success');
                } else {
                    showMessage(result.message || 'שגיאה בשליחת קוד אימות', 'error');
                }
            } catch (error) {
                console.error('Error sending verification code:', error);
                showMessage('שגיאה בחיבור לשרת', 'error');
            }
        });
        
        document.getElementById('verify-code-btn').addEventListener('click', async function() {
            const codeInput = document.getElementById('code-input');
            const code = codeInput.value.trim();
            
            if (!code) {
                showMessage('אנא הזן קוד אימות', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/verify_phone', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        phone: window.userPhone,
                        code: code 
                    }),
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    // Hide verification form and show chat
                    document.getElementById('phone-verification-container').style.display = 'none';
                    document.getElementById('chat-container').style.display = 'block';
                    
                    // Load agent settings and initialize chat
                    loadAgentSettings();
                    
                    // Add initial welcome message to transcript
                    const welcomeMessage = 'שלום! אני סוכן התמיכה הדיגיטלי של HomePay. ⚠️ שירות נסיוני: זהו שירות חדש בתקופת נסיון. המידע שנמסר באמצעות הסוכן יכול להיות לא מעודכן או לא מדויק. יש לקחת זאת בחשבון ובכל מקרה של אי הבנה יש לפנות לנציג אנושי. איך אני יכול לעזור לך היום?';
                    addToTranscript(welcomeMessage, 'ai');
                } else {
                    showMessage(result.message || 'קוד אימות שגוי', 'error');
                }
            } catch (error) {
                console.error('Error verifying code:', error);
                showMessage('שגיאה בחיבור לשרת', 'error');
            }
        });
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('verification-message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
        }
        
        // Load agent settings when page loads and show chat directly (skip phone verification)
        window.addEventListener('load', function() {
            // Skip phone verification and show chat directly
            document.getElementById('phone-verification-container').style.display = 'none';
            document.getElementById('chat-container').style.display = 'block';
            
            // Load agent settings and initialize chat
            loadAgentSettings();
            
            // Add initial welcome message to transcript
            const welcomeMessage = 'שלום! אני סוכן התמיכה הדיגיטלי של HomePay. ⚠️ שירות נסיוני: זהו שירות חדש בתקופת נסיון. המידע שנמסר באמצעות הסוכן יכול להיות לא מעודכן או לא מדויק. יש לקחת זאת בחשבון ובכל מקרה של אי הבנה יש לפנות לנציג אנושי. איך אני יכול לעזור לך היום?';
            addToTranscript(welcomeMessage, 'ai');
        });

        chatForm.addEventListener('submit', async function(event) {
            event.preventDefault();
            const userMessage = userInput.value.trim();

            if (userMessage) {
                addMessage(userMessage, 'user');
                addToTranscript(userMessage, 'user');
                userInput.value = ''; // Clear input
                typingIndicator.style.display = 'block'; // Show typing indicator

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ message: userMessage }),
                    });

                    typingIndicator.style.display = 'none'; // Hide typing indicator

                    if (!response.ok) {
                        const errorData = await response.json();
                        addMessage(`שגיאה: ${errorData.error || response.statusText}`, 'ai');
                        return;
                    }

                    const data = await response.json();
                    addMessage(data.reply, 'ai');
                    addToTranscript(data.reply, 'ai');

                } catch (error) {
                    typingIndicator.style.display = 'none'; // Hide typing indicator
                    console.error('Error sending message:', error);
                    const errorMsg = 'מצטער, אירעה שגיאה בתקשורת עם השרת.';
                    addMessage(errorMsg, 'ai');
                    addToTranscript(errorMsg, 'ai');
                }
            }
        });

        function addMessage(text, sender) {
            const message = document.createElement('div');
            message.className = `message ${sender}`;
            
            if (sender === 'user') {
                message.textContent = text;
            } else if (sender === 'ai' || sender === 'bot') {
                message.innerHTML = text;
            }
            
            chatMessages.appendChild(message);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
